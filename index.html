<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>1st Monthsary &lt;3</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600;700&family=Playfair+Display:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Playfair Display', Georgia, serif;
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      background: linear-gradient(135deg, #fce4ec, #f8e8e8, #fff0f5); padding: 20px;
      overflow: hidden;
    }
    .card {
      padding: 32px 24px; width: 100%; max-width: 360px;
      transition: opacity 0.6s ease;
    }
    .card.hide { opacity: 0; pointer-events: none; }
    h1 { font-size: 1.7rem; margin-bottom: 24px; text-align: center; color: #b71c5c; font-family: 'Dancing Script', cursive; }
    .field { margin-bottom: 18px; }
    label { display: block; font-size: 0.875rem; font-weight: 500; color: #880e4f; margin-bottom: 6px; }
    input {
      width: 100%; padding: 12px 14px; border: 1px solid #f5b7c5; border-radius: 10px;
      font-size: 1rem; outline: none; transition: border 0.2s; background: #fffafc; text-align: center;
    }
    input:focus { border-color: #e91e63; }
    .static-date {
      font-size: 1.1rem; color: #b71c5c; font-weight: 500; letter-spacing: 1px;
    }
    button {
      width: 100%; padding: 14px; background: linear-gradient(135deg, #e91e63, #c2185b); color: #fff; border: none;
      border-radius: 10px; font-size: 1rem; font-weight: 600; cursor: pointer; margin-top: 8px;
    }
    button:active { opacity: 0.85; }

    .scene {
      position: fixed; inset: 0; background: #0a0a0a;
      display: none; align-items: flex-end; justify-content: center;
      overflow: hidden;
    }
    .scene.show { display: flex; }

    .dirt {
      width: 200px; height: 50px; background: #4a3228;
      border-radius: 50% 50% 40% 40%; position: absolute; bottom: 0; left: 0;
      transform: scale(0); transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
      z-index: 2;
    }
    .dirt.show { transform: scale(1); }

    .plant-wrap {
      position: absolute; bottom: 0; left: 50%; transform: translateX(-50%);
      width: 200px; height: 300px;
    }
    .stem {
      width: 8px; height: 0; background: linear-gradient(to top, #2e7d32, #43a047);
      position: absolute; bottom: 25px; left: 50%; transform: translateX(-50%);
      border-radius: 4px 4px 0 0; z-index: 1;
    }
    .stem.grow { height: 250px; transition: height 2.5s ease-out; }

    .leaf {
      position: absolute; width: 50px; height: 25px; background: #43a047;
      border-radius: 50%; z-index: 1; opacity: 0;
    }
    .leaf.show { opacity: 1; }

    .leaf-left { bottom: 160px; left: 96px; transform: rotate(-30deg) scaleX(0); transform-origin: right center; }
    .leaf-left.show { animation: leafGrowLeft 0.6s ease-out forwards; }

    .leaf-right { bottom: 110px; left: 96px; transform: rotate(30deg) scaleX(0); transform-origin: left center; }
    .leaf-right.show { animation: leafGrowRight 0.6s ease-out forwards; }

    @keyframes leafGrowLeft {
      0% { transform: rotate(-30deg) scaleX(0); }
      100% { transform: rotate(-40deg) scaleX(1); }
    }
    @keyframes leafGrowRight {
      0% { transform: rotate(30deg) scaleX(0); }
      100% { transform: rotate(40deg) scaleX(1); }
    }

    .bud {
      position: absolute; bottom: 275px; left: 50%; transform: translateX(-50%); z-index: 3;
      opacity: 0; display: flex; align-items: flex-end;
    }
    .bud.show { opacity: 1; }

    .bud-inner {
      position: relative; width: 28px; height: 48px;
    }
    .bud-inner .p { position: absolute; bottom: 0; width: 28px; height: 48px;
      border-radius: 50% 50% 30% 30%; transform-origin: bottom center;
      transition: transform 0.8s ease-out, background 0.8s ease;
    }
    .bud-inner .p1 { background: #c2185b; left: 0px; transform: rotate(0deg); }
    .bud-inner .p2 { background: #c2185b; left: 0px; transform: rotate(0deg); }
    .bud-inner .p3 { background: #c2185b; left: 0px; }
    .bud-inner .p4 { background: #c2185b; left: 0px; transform: rotate(0deg); }
    .bud-inner .p5 { background: #c2185b; left: 0px; transform: rotate(0deg); }

    .bud-inner.bloom .p1 { transform: rotate(-35deg) scale(3); background: #d81b60; }
    .bud-inner.bloom .p2 { transform: rotate(-15deg) scale(3); background: #e91e63; }
    .bud-inner.bloom .p3 { transform: rotate(0deg) scale(3.1); background: #f48fb1; }
    .bud-inner.bloom .p4 { transform: rotate(15deg) scale(3); background: #e91e63; }
    .bud-inner.bloom .p5 { transform: rotate(35deg) scale(3); background: #d81b60; }

    .greeting-text {
      position: absolute; top: 30px; left: 0; right: 0; text-align: center;
      font-family: 'Dancing Script', cursive; font-size: 5.4rem;
      color: #f48fb1; opacity: 0; transition: opacity 1s ease;
      z-index: 10; padding: 0 20px; line-height: 1.1;
    }
    .greeting-text.show { opacity: 1; }

    .poem {
      position: absolute; top: 140px; left: 0; right: 0; text-align: center;
      font-family: 'Playfair Display', serif; font-size: 0.85rem;
      color: #f8c8d8; opacity: 0; transition: opacity 1.5s ease;
      z-index: 10; padding: 0 24px; line-height: 1.8;
      max-width: 380px; margin: 0 auto; white-space: pre-line;
    }
    .poem.show { opacity: 1; }
  </style>
</head>
<body>
  <div class="card" id="card">
    <h1>It's the time of the month Luv!</h1>
    <div class="field">
      <input type="text" id="name" placeholder="Enter your name" required>
    </div>
    <div class="field" style="text-align:center;">
      <div class="static-date">07/14/26</div>
    </div>
    <button onclick="handleSubmit()">Continue</button>
  </div>

  <div class="scene" id="scene">
    <div class="greeting-text" id="greetingText"></div>
    <div class="poem" id="poem"></div>
    <div class="plant-wrap">
      <div class="bud" id="bud">
        <div class="bud-inner" id="budInner">
          <div class="p p1"></div>
          <div class="p p2"></div>
          <div class="p p3"></div>
          <div class="p p4"></div>
          <div class="p p5"></div>
        </div>
      </div>
      <div class="stem" id="stem"></div>
      <div class="leaf leaf-left" id="leafLeft"></div>
      <div class="leaf leaf-right" id="leafRight"></div>
      <div class="dirt" id="dirt"></div>
    </div>
  </div>

  <script>
    function handleSubmit() {
      const name = document.getElementById('name').value.trim();
      if (!name) {
        document.getElementById('name').focus();
        return;
      }
      document.getElementById('card').classList.add('hide');
      setTimeout(() => startAnimation(name), 700);
    }

    function startAnimation(name) {
      const scene = document.getElementById('scene');
      scene.classList.add('show');

      const dirt = document.getElementById('dirt');
      const stem = document.getElementById('stem');
      const leafL = document.getElementById('leafLeft');
      const leafR = document.getElementById('leafRight');
      const bud = document.getElementById('bud');
      const budInner = document.getElementById('budInner');
      const greeting = document.getElementById('greetingText');
      const poem = document.getElementById('poem');

      setTimeout(() => dirt.classList.add('show'), 200);
      setTimeout(() => stem.classList.add('grow'), 600);
      setTimeout(() => leafL.classList.add('show'), 1600);
      setTimeout(() => leafR.classList.add('show'), 2100);
      setTimeout(() => bud.classList.add('show'), 2800);
      setTimeout(() => budInner.classList.add('bloom'), 3200);
      setTimeout(() => {
        greeting.textContent = `Happy Monthsary, ${name}! \u2764\uFE0F`;
        greeting.classList.add('show');
      }, 4200);
      setTimeout(() => {
        poem.textContent = `its surreal and absurd
as you define my world
never expected,
yet fate insisted
can't help but think
you really got me in a wink

like the ridleys swearing on zeus
like the goo goo dolls giving up forever
like the 1975 never knowing what to think about
like Nicole thinking its a dream
like Menudo yearning for the touch
like the shamrock being a slave

I will love you as much as i can do
Happy 1st Monthsary My Luv

P.S "Can I Know Your Real Name Na?? T T"`;
        poem.classList.add('show');
      }, 5000);
    }
  </script>
</body>
</html>
